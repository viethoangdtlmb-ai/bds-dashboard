name: Daily BDS Crawl & Dashboard Update

on:
  schedule:
    # 14:00 UTC = 21:00 VN
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout bds-dashboard
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout hanoi-bds-insight
        uses: actions/checkout@v4
        with:
          repository: viethoangdtlmb-ai/hanoi-bds-insight
          token: ${{ secrets.GITHUB_TOKEN }}
          path: hanoi-bds-insight

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write config files from secrets
        run: |
          if [ -n "$SHEETS_CONFIG" ]; then echo "$SHEETS_CONFIG" > data/google_sheets_config.json; fi
          if [ -n "$TELEGRAM_CONFIG" ]; then echo "$TELEGRAM_CONFIG" > data/telegram_config.json; fi
        env:
          SHEETS_CONFIG: ${{ secrets.GOOGLE_SHEETS_CONFIG }}
          TELEGRAM_CONFIG: ${{ secrets.TELEGRAM_CONFIG }}

      - name: Backup CSV files
        run: |
          mkdir -p data/backup
          DATE=$(date +'%Y-%m-%d')
          for f in data/lich_su_chi_so.csv data/lich_su_chi_so_phai_sinh.csv data/du_lieu_tho_crawl.csv; do
            [ -f "$f" ] && cp "$f" "data/backup/$(basename $f .csv)_${DATE}.csv"
          done
          cd data/backup
          ls -t lich_su_chi_so_2*.csv 2>/dev/null | tail -n +31 | xargs -r rm
          ls -t lich_su_chi_so_phai_sinh_2*.csv 2>/dev/null | tail -n +31 | xargs -r rm
          ls -t du_lieu_tho_crawl_2*.csv 2>/dev/null | tail -n +31 | xargs -r rm

      - name: Run crawl
        run: python scripts/crawl_chi_so_thi_truong.py
        env:
          BDS_DATA_DIR: data

      - name: Calculate indicators
        run: python scripts/tinh_chi_so_phai_sinh.py
        env:
          BDS_DATA_DIR: data

      - name: Generate dashboard HTML
        run: python scripts/xem_bieu_do.py
        env:
          BDS_DATA_DIR: data

      - name: Copy dashboard to root
        run: cp data/BIEU_DO_THI_TRUONG.html index.html

      - name: Update median data
        run: python scripts/tong_hop_tuan.py

      - name: Deploy to hanoi-bds-insight
        run: |
          cp data/dashboard_data.json hanoi-bds-insight/data.json
          cd hanoi-bds-insight
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to website"
          else
            git commit -m "Auto update data $(date +'%d/%m/%Y %H:%M') VN"
            git push
          fi

      - name: Send to Google Sheets
        continue-on-error: true
        run: python scripts/gui_google_sheets.py
        env:
          BDS_DATA_DIR: data

      - name: Commit and push bds-dashboard
        env:
          TZ: Asia/Ho_Chi_Minh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update $(date +'%d/%m/%Y %H:%M') VN"
            git pull --rebase origin main
            git push
          fi
