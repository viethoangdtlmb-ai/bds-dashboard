name: Daily BDS Pipeline

on:
  schedule:
    # Chạy mỗi ngày lúc 0:30 UTC = 7:30 sáng VN
    - cron: '30 0 * * *'
  workflow_dispatch:  # Cho phép chạy thủ công

permissions:
  contents: write

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout bds-dashboard
        uses: actions/checkout@v4
        with:
          repository: viethoangdtlmb-ai/bds-dashboard
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          repository: viethoangdtlmb-ai/bds-dashboard
          path: dashboard

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install curl_cffi beautifulsoup4 openpyxl

      - name: Copy source files
        run: |
          # Copy tất cả Python scripts từ repo chính
          # NOTE: Nếu dùng Plan B (local), bỏ qua step này
          echo "Source files ready"

      - name: Run crawler
        run: python crawl_chi_so_thi_truong.py
        continue-on-error: true
        env:
          PYTHONIOENCODING: utf-8

      - name: Run derived indicators
        run: python tinh_chi_so_phai_sinh.py
        continue-on-error: true
        env:
          PYTHONIOENCODING: utf-8

      - name: Generate HTML dashboard
        run: python xem_bieu_do.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Send Telegram notification
        if: always()
        run: python gui_telegram.py
        env:
          PYTHONIOENCODING: utf-8
        continue-on-error: true

      - name: Deploy to GitHub Pages
        run: |
          cp BIEU_DO_THI_TRUONG.html dashboard/index.html || true
          cd dashboard
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto update $(date +%Y-%m-%d)"
          git push
